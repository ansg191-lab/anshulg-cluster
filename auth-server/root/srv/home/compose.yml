services:
  home:
    image: ghcr.io/ansg191/anshulg-com:0.4.2@sha256:ba69e4f74fae439f0485175241e99644b8e1cf3f81f1e1f6c5acfec6ee858733

    ports:
      - "127.0.0.1:4321:4321"

    restart: always
    user: "${COMPOSE_UID}:${COMPOSE_GID}"
    cap_drop:
      - ALL
    read_only: true

    env_file:
      - "/srv/home/home.env"

    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 64M
        limits:
          cpus: "0.5"
          memory: 128M
