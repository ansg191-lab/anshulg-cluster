apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: empty
spec:
  template:
    spec:
      securityContext:
        supplementalGroups:
          - 3002 # dataapps - for /data/BookImport access
      containers:
        - name: app
          env:
            - name: HIJACK_OUT
              value: "1"
            - name: RECEIVER_SERVER_URL
              value: "http://beets-import.beets.svc.cluster.local"
            - name: BOOK_DEST
              value: /bookimport
          envFrom:
            - secretRef:
                name: qui-secrets
          volumeMounts:
            - mountPath: /config
              name: data
            - mountPath: /sender
              name: beets-sender
              # Doesn't work right now
              # See https://github.com/kubernetes/kubernetes/issues/134894
              # subPath: usr/local/bin/sender
              readOnly: true
            - mountPath: /book-copier
              name: book-copier
              readOnly: true
            - mountPath: /bookimport
              name: bookimport
          readinessProbe:
            httpGet:
              port: 7476
              path: /health
      volumes:
        - name: beets-sender
          image:
            reference: ghcr.io/ansg191/torrent-beets-importer/sender:main
            pullPolicy: Always
        - name: book-copier
          image:
            reference: ghcr.io/ansg191/qui-book-copier:main
            pullPolicy: Always
        - name: bookimport
          hostPath:
            path: /data/BookImport
