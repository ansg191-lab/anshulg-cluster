apiVersion: operator.victoriametrics.com/v1
kind: VLSingle
metadata:
  name: main
spec:
  retentionPeriod: 15d
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 30Gi
    storageClassName: local-path
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
