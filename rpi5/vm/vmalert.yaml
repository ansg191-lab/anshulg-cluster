apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlert
metadata:
  name: main
spec:
  replicaCount: 1
  evaluationInterval: "30s"
  selectAllByDefault: true
  datasource:
    url: http://vmsingle-main.vm.svc:8428
  remoteWrite:
    url: http://vmsingle-main.vm.svc:8428
  remoteRead:
    url: http://vmsingle-main.vm.svc:8428
  notifiers:
    - url: http://vmalertmanager-main.vm.svc:9093
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
