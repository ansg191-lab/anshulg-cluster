nameOverride: ""
fullnameOverride: ""

mail:
  replicaCount: 3
  existingSecret: "fastmail"
  persistence:
    enabled: true
  metrics:
    enabled: false  # Disable metrics due to https://github.com/bokysan/docker-postfix/issues/278
  recreateOnRedeploy: false
  resources:
    requests:
      cpu: "10m"
      memory: "128Mi"
    limits:
      memory: "512Mi"

  container:
    postfix:
      securityContext:
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
