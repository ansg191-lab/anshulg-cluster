apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-images-claude-auth-proxy
spec:
  validationActions: [ Deny ]
  webhookConfiguration:
    timeoutSeconds: 30
  failurePolicy: Fail
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups: [ "" ]
        apiVersions: [ "v1" ]
        operations: [ "CREATE", "UPDATE" ]
        resources: [ "pods" ]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values: [ "claude-auth-proxy" ]
  matchImageReferences:
    - glob: "ghcr.io/ansg191/claude-auth-proxy*"
  attestors:
    - name: cosign
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: '^https://github\.com/ansg191/claude-auth-proxy/\.github/workflows/docker\.yml@refs/'
  validations:
    - expression: >-
        images.containers.map(image, verifyImageSignatures(image, [attestors.cosign])).all(e, e > 0)
      message: 'Image signature verification failed for claude-auth-proxy.'
