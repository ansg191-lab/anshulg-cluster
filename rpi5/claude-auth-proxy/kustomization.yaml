apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/statefulset
  - serverstransport.yaml
  - middleware.yaml
  - policy.yaml

components:
  - ../../kustomize/components/ingress
  - ../../kustomize/components/direct-ingress

configurations:
  - nameReferences.yaml

namePrefix: anthropic-
labels:
  - pairs:
      app.kubernetes.io/name: anthropic
    includeSelectors: true

images:
  - name: busybox
    newName: ghcr.io/ansg191/claude-auth-proxy
    newTag: main@sha256:61287f2397fb4b752ca8f649ec981240743b7d0d2fbc96a4dcc43feedc11b76b

configMapGenerator:
  - name: domain-config
    literals:
      - DOMAIN=anthropic.internal
      - DIRECT_DOMAIN=anthropic.anshulg.direct
  - name: env-config
    literals:
      - RUST_LOG=debug,h2=info

patches:
  - target:
      kind: StatefulSet
    path: patch-statefulset.yaml
  - target:
      kind: StatefulSet
    path: patch-statefulset2.yaml
  - target:
      kind: Service
    path: patch-service.yaml
  - target:
      kind: IngressRoute
    path: patch-ingress.yaml
