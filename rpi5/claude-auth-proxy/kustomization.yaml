apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/statefulset
  - serverstransport.yaml
  - middleware.yaml

components:
  - ../../kustomize/components/ingress
  - ../../kustomize/components/direct-ingress

configurations:
  - nameReferences.yaml

namePrefix: anthropic-
labels:
  - pairs:
      app.kubernetes.io/name: anthropic
    includeSelectors: true

images:
  - name: busybox
    newName: ghcr.io/ansg191/claude-auth-proxy
    newTag: main@sha256:059899da6e162d6e228e8f2cc4e1b08e5ba65c6e3f3da9356742a41082d74ad8

configMapGenerator:
  - name: domain-config
    literals:
      - DOMAIN=anthropic.internal
      - DIRECT_DOMAIN=anthropic.anshulg.direct
  - name: env-config
    literals:
      - RUST_LOG=debug,h2=info

patches:
  - target:
      kind: StatefulSet
    path: patch-statefulset.yaml
  - target:
      kind: StatefulSet
    path: patch-statefulset2.yaml
  - target:
      kind: Service
    path: patch-service.yaml
  - target:
      kind: IngressRoute
    path: patch-ingress.yaml
