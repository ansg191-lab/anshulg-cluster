apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/deployment
  - key.yaml
  - secrets.yaml

components:
  - ../../kustomize/components/ingress
#  - ../../kustomize/components/security-context

namePrefix: renovate-pr-triage-
labels:
  - pairs:
      app.kubernetes.io/name: renovate-pr-triage
    includeSelectors: true

images:
  - name: busybox
    newName: ghcr.io/ansg191-lab/renovate-pr-triage
    newTag: main@sha256:ae23c139d6dac785e602b2f6468205d099846dcc8cfe8b910bbf100eabb52e56

configMapGenerator:
  - name: domain-config
    literals:
      - DOMAIN=renovate-pr-triage.internal

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
    path: patch-deployment.yaml
  - target:
      kind: Deployment
    path: patch-deployment2.yaml
  - target:
      kind: Service
    path: patch-service.yaml
