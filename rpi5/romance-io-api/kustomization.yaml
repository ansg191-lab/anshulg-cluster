apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/deployment
  - cloudflare-bypass.yaml
  - valkey.yaml

components:
  - ../../kustomize/components/ingress

namePrefix: romance-io-api-
labels:
  - pairs:
      app.kubernetes.io/name: romance-io-api
    includeSelectors: true

images:
  - name: busybox
    newName: ghcr.io/ansg191/romance-io-api
    newTag: 0.1.1@sha256:fdb10348c2b9b65201e1f0ad1cf703b39eacc623bc6e55fdf750fe9ac6f435ea

configMapGenerator:
  - name: domain-config
    literals:
      - DOMAIN=romance-io-api.internal

patches:
  - target:
      kind: Deployment
      name: deployment
    path: patch-deployment-ports.yaml
  - target:
      kind: Deployment
      name: deployment
    path: patch-deployment.yaml
  - target:
      kind: Service
      name: svc
    path: patch-service.yaml
