apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      template:
        metadata:
          annotations:
            linkerd.io/inject: enabled
        spec:
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:7.5.1@sha256:0730f39efc23c6410c46f9bf1884149c986f300bb60f66f3c5d6dbcb67a08901
              imagePullPolicy: IfNotPresent
              args:
                - sync
              volumeMounts:
                - mountPath: /tmp
                  name: tmp
                - mountPath: /config/recyclarr.yml
                  name: config
                  subPath: recyclarr.yml
                  readOnly: true
                - mountPath: /config/secrets.yml
                  name: secrets
                  subPath: secret.yml
                  readOnly: true
              securityContext:
                runAsUser: 10001
                runAsGroup: 10001
                capabilities:
                  drop:
                    - ALL
                allowPrivilegeEscalation: false
                privileged: false
                readOnlyRootFilesystem: true
          volumes:
            - name: tmp
              emptyDir:
                medium: Memory
            - name: config
              configMap:
                name: recyclarr-config
            - name: secrets
              secret:
                secretName: recyclarr-secret
          restartPolicy: OnFailure
