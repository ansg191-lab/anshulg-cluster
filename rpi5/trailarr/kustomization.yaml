apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/statefulset
  - oauth.yaml
  - oauth-config.yaml

components:
  - ../../kustomize/components/ingress

namePrefix: trailarr-
labels:
  - pairs:
      app.kubernetes.io/name: trailarr
    includeSelectors: true

images:
  - name: busybox
    newName: nandyalu/trailarr
    newTag: 0.10.0@sha256:a0e8e077fd0c5ff5344502fd3b8a8bb9214aa26b91bbce1d5b6b86819f042ced

configMapGenerator:
  - name: domain-config
    literals:
      - DOMAIN=trailarr.internal

patches:
  - target:
      kind: StatefulSet
    path: patch-statefulset.yaml
  - target:
      kind: StatefulSet
    path: patch-statefulset2.yaml
  - target:
      kind: Service
      name: svc
    path: patch-service.yaml
  - target:
      kind: IngressRoute
      name: ingress
    path: patch-ingress.yaml
