apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: empty
  annotations:
    ignore-check.kube-linter.io/run-as-non-root: "Container must run as root to access media files"
    ignore-check.kube-linter.io/no-read-only-root-fs: "Container hasn't been tested with read-only FS yet"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: trailarr
  template:
    metadata:
      labels:
        app.kubernetes.io/component: trailarr
    spec:
      containers:
        - name: app
          env:
            - name: PUID
              value: "2009"
            - name: PGID
              value: "3002"
            - name: TZ
              value: "America/Los_Angeles"
            - name: WEBUI_DISABLE_AUTH
              value: "True"
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /data
              name: data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          readinessProbe:
            httpGet:
              port: 7889
              path: /status
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
      restartPolicy: Always
      securityContext:
        fsGroup: 3002
      volumes:
        - name: data
          hostPath:
            path: /data
            type: Directory
  volumeClaimTemplates:
    - metadata:
        name: config
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi
