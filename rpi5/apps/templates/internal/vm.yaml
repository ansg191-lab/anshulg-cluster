apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vm
  namespace: argocd
spec:
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: vm
  project: internal
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
  source:
    repoURL: {{ .Values.spec.source.repoURL }}
    targetRevision: {{ .Values.spec.source.branch }}
    path: rpi5/vm
