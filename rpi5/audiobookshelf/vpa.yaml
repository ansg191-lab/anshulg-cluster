apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: audiobookshelf-vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: audiobookshelf
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        controlledResources: ["cpu", "memory"]
