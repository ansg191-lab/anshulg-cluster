apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: openclaw
spec:
  envFrom:
    - secretRef:
        name: openclaw-api-keys

  config:
    mergeMode: merge
    raw:
      agents:
        defaults:
          model:
            primary: "anthropic/claude-sonnet-4-6"
      cron:
        enabled: true

  storage:
    persistence:
      enabled: true
      size: "10Gi"

  selfConfigure:
    enabled: true
    allowedActions:
      - skills
      - config
      - envVars
      - workspaceFiles

  chromium:
    enabled: true
    image:
      repository: chromedp/headless-shell
      tag: "stable"
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
    persistence:
      enabled: true
      size: "1Gi"

  availability:
    nodeSelector:
      kubernetes.io/hostname: odroid-h4

  probes:
    startup:
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 60
      timeoutSeconds: 5
    liveness:
      initialDelaySeconds: 120
      periodSeconds: 30
      failureThreshold: 5
      timeoutSeconds: 10
