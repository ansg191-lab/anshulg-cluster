apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`openclaw.internal`)
      middlewares:
        - name: security-headers
          namespace: kube-system
      services:
        - name: openclaw
          port: 18789
  tls:
    secretName: openclaw-cert-tls
    domains:
      - main: openclaw.internal
