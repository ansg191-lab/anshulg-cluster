apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ragflow-redis-data
  namespace: ragflow
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragflow-redis
  namespace: ragflow
  labels:
    app: ragflow
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ragflow
      component: redis
  template:
    metadata:
      labels:
        app: ragflow
        component: redis
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: redis
          image: valkey/valkey:8
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --maxmemory
            - 128mb
            - --maxmemory-policy
            - allkeys-lru
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ragflow-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - mountPath: /data
              name: redis-data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            exec:
              command:
                - redis-cli
                - "-a"
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - "-a"
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: ragflow-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: ragflow-redis
  namespace: ragflow
spec:
  selector:
    app: ragflow
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
