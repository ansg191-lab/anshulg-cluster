apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ragflow-public
  namespace: ragflow
  annotations:
    external-dns.alpha.kubernetes.io/target: "192.168.1.100"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`ragflow.anshulg.direct`)
      middlewares:
        - name: security-headers
          namespace: kube-system
      services:
        - name: ragflow-server
          port: 80
  tls:
    secretName: ragflow-public-cert-tls
    domains:
      - main: ragflow.anshulg.direct
