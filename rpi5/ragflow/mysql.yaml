apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ragflow-mysql-data
  namespace: ragflow
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragflow-mysql
  namespace: ragflow
  labels:
    app: ragflow
    component: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ragflow
      component: mysql
  template:
    metadata:
      labels:
        app: ragflow
        component: mysql
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: mysql
          image: mysql:8.0.39
          imagePullPolicy: IfNotPresent
          args:
            - --max_connections=1000
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --default-authentication-plugin=mysql_native_password
            - "--tls_version=TLSv1.2,TLSv1.3"
            - --init-file
            - /data/application/init.sql
            - --binlog_expire_logs_seconds=604800
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ragflow-secrets
                  key: MYSQL_PASSWORD
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: mysql-data
            - mountPath: /data/application/init.sql
              name: mysql-init
              subPath: init.sql
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - "-uroot"
                - "-p$(MYSQL_ROOT_PASSWORD)"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - "-uroot"
                - "-p$(MYSQL_ROOT_PASSWORD)"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: ragflow-mysql-data
        - name: mysql-init
          configMap:
            name: ragflow-mysql-init
---
apiVersion: v1
kind: Service
metadata:
  name: ragflow-mysql
  namespace: ragflow
spec:
  selector:
    app: ragflow
    component: mysql
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
