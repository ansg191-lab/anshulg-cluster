apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragflow-server
  namespace: ragflow
  labels:
    app: ragflow
    component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ragflow
      component: server
  template:
    metadata:
      labels:
        app: ragflow
        component: server
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: wait-for-mysql
          image: mysql:8.0.39
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until mysqladmin ping -h ragflow-mysql -uroot -p$(MYSQL_ROOT_PASSWORD) --silent; do
                echo "Waiting for MySQL...";
                sleep 5;
              done
              echo "MySQL is ready!"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ragflow-secrets
                  key: MYSQL_PASSWORD
          resources:
            requests:
              cpu: 10m
            limits:
              memory: 64Mi
      containers:
        - name: ragflow
          image: infiniflow/ragflow:v0.24.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: web
            - containerPort: 9380
              name: api
          envFrom:
            - configMapRef:
                name: ragflow-config
            - secretRef:
                name: ragflow-secrets
          volumeMounts:
            - mountPath: /etc/nginx/nginx.conf
              name: nginx-conf
              subPath: nginx.conf
            - mountPath: /etc/nginx/conf.d/ragflow.conf
              name: nginx-conf
              subPath: ragflow.conf
            - mountPath: /etc/nginx/proxy.conf
              name: nginx-conf
              subPath: proxy.conf
            - mountPath: /ragflow/logs
              name: logs-volume
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: nginx-conf
          configMap:
            name: ragflow-nginx-config
        - name: logs-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ragflow-server
  namespace: ragflow
spec:
  selector:
    app: ragflow
    component: server
  ports:
    - port: 80
      targetPort: 80
      name: web
    - port: 9380
      targetPort: 9380
      name: api
