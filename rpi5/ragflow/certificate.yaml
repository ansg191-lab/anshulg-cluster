apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ragflow-public-cert
  namespace: ragflow
spec:
  secretName: ragflow-public-cert-tls
  commonName: ragflow.anshulg.direct
  dnsNames:
    - ragflow.anshulg.direct
  duration: 2160h0m0s
  renewBefore: 720h0m0s
  privateKey:
    algorithm: ECDSA
    size: 384
    rotationPolicy: Always
  subject:
    organizations:
      - Anshul Gupta
    organizationalUnits:
      - rpi5
    provinces:
      - California
    countries:
      - US
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
