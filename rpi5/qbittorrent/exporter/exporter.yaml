apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbt-exporter
  labels:
    app: qbt-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbt-exporter
  template:
    metadata:
      name: qbt-exporter
      labels:
        app: qbt-exporter
    spec:
      containers:
        - name: qbt-exporter
          image: ghcr.io/martabal/qbittorrent-exporter:v1.13.4@sha256:b7360b87bcbe0982e1784a6e341d9cf00137795803eac4fe9f8dd9f813d72fb6
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: exporter-config
            - secretRef:
                name: exporter-auth
          ports:
            - containerPort: 8090
              protocol: TCP
              name: http
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      restartPolicy: Always
