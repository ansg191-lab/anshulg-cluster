  apiVersion: rbac.authorization.k8s.io/v1
  kind: ClusterRole
  metadata:
    name: kyverno:background-controller:read-secrets
    labels:
      rbac.kyverno.io/aggregate-to-background-controller: "true"
  rules:
    - apiGroups: [""]
      resources: ["secrets"]
      verbs: ["create", "get", "list", "watch", "update"]
