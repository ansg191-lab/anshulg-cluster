# Wrapper unbound.conf, mounted in place of the image's bundled file.
#
# Why we ship our own: the image's stock unbound.conf `include:`s
# /usr/local/unbound/conf.d/*.conf at line 11, BEFORE its `server:` clause
# at line 19. Any setting we put under conf.d/ gets clobbered by the
# image's hardcoded defaults a few lines later. By replacing unbound.conf
# we move the include to the END of the file, where last-wins semantics
# let our shards override.

server:
  # Distroless image: no chroot, no setuid (entrypoint already drops to
  # the _unbound user via su-exec).
  chroot: ""
  username: ""
  directory: "/usr/local/unbound"

  # Listen on the image's unprivileged default port; the Service remaps
  # 53 -> 5335 so consumers still hit the standard DNS port.
  interface: 0.0.0.0@5335
  port: 5335

  # DNSSEC trust anchor. The entrypoint runs `unbound-anchor -a <path>`
  # before unbound starts, so this file is populated by the time we read it.
  auto-trust-anchor-file: "/usr/local/unbound/iana.d/root.key"

# Behavioural config lives in shards under conf.d/ (this dir is a
# ConfigMap mount). Loaded last so it overrides defaults set above.
include-toplevel: "/usr/local/unbound/conf.d/*.conf"

# Local zone data (local-data: entries for *.internal) lives in zones.d/.
include-toplevel: "/usr/local/unbound/zones.d/*.conf"
