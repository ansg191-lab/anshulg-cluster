server:
  # Enable or disable whether IPv6 queries are answered or issued.
  # If disabled, queries are not answered on IPv6, and queries are not sent
  # on IPv6 to the internet nameservers. With this option you can disable the
  # IPv6 transport for sending DNS traffic, it does not impact the contents
  # of the DNS traffic, which may have IPv4 (A) and IPv6 (AAAA) addresses in
  # it.
  # Default: yes (in upstream unbound). The madnuttah image ships do-ip6: no
  # in its bundled unbound.conf, so we explicitly override.
  do-ip6: yes

  # Prevent the unbound server from forking into the background as a daemon.
  # We run as PID 1's child under tini in the container; no daemonising.
  do-daemonize: no

  # Add localhost to the do-not-query-address list.
  # We DO want to query localhost (e.g. for the healthcheck probe), so leave off.
  do-not-query-localhost: no

  # Pidfile must live on a writable volume; the image default
  # (/usr/local/unbound/unbound.d/unbound.pid) sits on a read-only filesystem
  # under our security context. The Deployment mounts an emptyDir at
  # /var/run/unbound for this.
  pidfile: "/var/run/unbound/unbound.pid"
