apiVersion: apps/v1
kind: Deployment
metadata:
  name: unbound
  labels:
    app: unbound
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: unbound
  template:
    metadata:
      labels:
        app: unbound
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: unbound
          image: madnuttah/unbound:1.25.1-2@sha256:05312ebc069e2533435bdc1a799353d51642026175b6c8a060347066ab98b164
          imagePullPolicy: IfNotPresent
          env:
            # Skip the entrypoint's chown / setperms pass - would fail under
            # readOnlyRootFilesystem. UID/GID alignment is handled by the
            # pod securityContext above.
            - name: DISABLE_SET_PERMS
              value: "true"
          ports:
            # Image listens on 5335 (unprivileged); Service remaps 53 -> 5335.
            - containerPort: 5335
              protocol: TCP
              name: dns-tcp
            - containerPort: 5335
              protocol: UDP
              name: dns-udp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - mountPath: /usr/local/unbound/unbound.conf
              name: main
              subPath: unbound.conf
              readOnly: true
            - mountPath: /usr/local/unbound/conf.d
              name: confd
              readOnly: true
            - mountPath: /usr/local/unbound/zones.d
              name: zonesd
              readOnly: true
            - mountPath: /usr/local/unbound/iana.d
              name: iana
            - mountPath: /var/run/unbound
              name: runtime
            - mountPath: /tmp
              name: tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            exec:
              command: ["/usr/local/unbound/sbin/healthcheck.sh"]
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["/usr/local/unbound/sbin/healthcheck.sh"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
      volumes:
        # Kustomize rewrites these names to include the content-hash suffix
        # generated by configMapGenerator.
        - name: main
          configMap:
            name: unbound-main
        - name: confd
          configMap:
            name: unbound-confd
        - name: zonesd
          configMap:
            name: unbound-zonesd
        - name: iana
          emptyDir: {}
        - name: runtime
          emptyDir: {}
        - name: tmp
          emptyDir: {}
