apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: radarr-vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: radarr
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: radarr
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsAndLimits
        maxAllowed:
          memory: 1Gi
      - containerName: linkerd-proxy
        mode: "Off"
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: oauth-proxy-vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oauth-proxy
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
  resourcePolicy:
    containerPolicies:
      - containerName: oauth-proxy
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsAndLimits
      - containerName: linkerd-proxy
        mode: "Off"
