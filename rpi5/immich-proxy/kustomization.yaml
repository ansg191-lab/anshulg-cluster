apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/deployment
  - middleware.yaml

components:
  - ../../kustomize/components/ingress
  - ../../kustomize/components/direct-ingress
  - ../../kustomize/components/security-context
  - ../../kustomize/components/tailscale

namePrefix: immich-
labels:
  - pairs:
      app.kubernetes.io/name: immich
    includeSelectors: true

images:
  - name: busybox
    newName: dhi.io/nginx
    newTag: 1.31-debian13-dev@sha256:82dfa64267251a13d87ec5d2332b5cd3bfb16e77f651e1a9c7f532e527266d54

configMapGenerator:
  - name: domain-config
    literals:
      - DOMAIN=immich.internal
      - DIRECT_DOMAIN=immich.anshulg.direct
      - TS_HOST=immich
  - name: nginx-proxy-template
    files:
      - default.conf.template=default.conf.template
  - name: nginx-env
    literals:
      - UPSTREAM_HOST=192.168.1.10:30041

patches:
  - target:
      kind: Deployment
    path: patch-deployment.yaml
  - target:
      kind: Deployment
    path: patch-deployment2.yaml
  - target:
      kind: Service
    path: patch-service.yaml
  - target:
      kind: IngressRoute
    path: patch-ingress-buffering.yaml
