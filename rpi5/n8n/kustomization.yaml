apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/statefulset
  - secrets.yaml

components:
  - ../../kustomize/components/ingress
  - ../../kustomize/components/direct-ingress
  - ../../kustomize/components/security-context

namePrefix: n8n-
labels:
  - pairs:
      app.kubernetes.io/name: n8n
    includeSelectors: true

images:
  - name: busybox
    newName: n8nio/n8n
    newTag: 2.19.2@sha256:385ea908fee7f77792ccf1a1cfd8f1509f2b55d9b20db7b3b00df5e8f85d8875

configMapGenerator:
  - name: domain-config
    literals:
      - DOMAIN=n8n.internal
      - DIRECT_DOMAIN=n8n.anshulg.direct
  - name: env-config
    literals:
      - TZ=America/Los_Angeles
      - N8N_USER_FOLDER=/data
      - N8N_HOST=n8n.anshulg.net
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_RESTRICT_FILE_ACCESS_TO=/data/.n8n-files
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=rpi4.anshulg.direct
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_SCHEMA=public
      - DB_POSTGRESDB_SSL_ENABLED=true
      - DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED=false
      - DB_POSTGRESDB_SSL_CA=/etc/ssl/certs/ca-certificates.crt
      - WEBHOOK_URL=https://n8n.anshulg.net/
      - N8N_PROXY_HOPS=1

patches:
  - target:
      kind: StatefulSet
    path: patch-statefulset.yaml
  - target:
      kind: StatefulSet
    path: patch-statefulset2.yaml
  - target:
      kind: Service
    path: patch-service.yaml
