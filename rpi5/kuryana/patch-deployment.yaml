apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuryana
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: app
          readinessProbe:
            httpGet:
              port: 8000
              path: /
          resources:
            requests:
              cpu: 5m
              memory: 128Mi
            limits:
              memory: 192Mi
