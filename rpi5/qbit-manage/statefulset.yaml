apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qbit-manage
  labels:
    app: qbit-manage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbit-manage
  serviceName: qbit-manage
  template:
    metadata:
      name: qbit-manage
      labels:
        app: qbit-manage
    spec:
      containers:
        - name: qbit-manage
          image: ghcr.io/stuffanthings/qbit_manage:v4.9.1@sha256:cafdbdc61315ada302a494af9ee112a7b85eda5369edbb5b3b2d69eaccd63b2b
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: qbt-manage-env
          ports:
            - containerPort: 8181
              protocol: TCP
              name: http
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /data
              name: data
          securityContext:
            runAsUser: 2020
            runAsGroup: 3002
      restartPolicy: Always
      securityContext:
        fsGroup: 3002
      volumes:
        - name: data
          hostPath:
            path: /data
  volumeClaimTemplates:
    - metadata:
        name: config
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi
