apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/deployment
  - secret.yaml

components:
  - ../../kustomize/components/ingress

namePrefix: browserless-
labels:
  - pairs:
      app.kubernetes.io/name: browserless
    includeSelectors: true

images:
  - name: busybox
    newName: ghcr.io/browserless/chromium
    newTag: latest@sha256:4d398b6e756c5f7bc2b3a5f66f3bb8c8afc69fb76ff31ffd83c0588c5945c291

configMapGenerator:
  - name: domain-config
    literals:
      - DOMAIN=browserless.internal
  - name: browserless-config
    literals:
      - PREBOOT=true
      - CONCURRENT=5
      - MAX_QUEUE_LENGTH=20
      - TIMEOUT=300000

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
    path: patch-deployment.yaml
  - target:
      kind: Service
    path: patch-service.yaml
