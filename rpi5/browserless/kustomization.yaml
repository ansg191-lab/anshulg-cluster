apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/deployment
  - secret.yaml

components:
  - ../../kustomize/components/ingress

namePrefix: browserless-
labels:
  - pairs:
      app.kubernetes.io/name: browserless
    includeSelectors: true

images:
  - name: busybox
    newName: ghcr.io/browserless/chromium
    newTag: latest@sha256:16912ab5a721295e8c1fae4f3f442e827f6f4a8e1dff9c3d75111a7560d49181

configMapGenerator:
  - name: domain-config
    literals:
      - DOMAIN=browserless.internal
  - name: browserless-config
    literals:
      - PREBOOT=true
      - CONCURRENT=5
      - MAX_QUEUE_LENGTH=20
      - TIMEOUT=300000

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
    path: patch-deployment.yaml
  - target:
      kind: Service
    path: patch-service.yaml
