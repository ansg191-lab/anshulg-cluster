apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - cronjob.yaml
  - secret.yaml
  - pvc.yaml

labels:
  - pairs:
      app.kubernetes.io/name: mam-point-spender
    includeSelectors: true

configMapGenerator:
  - name: env
    literals:
      - MAM_BUFFER=25000
      - MAM_VIP=1
      - MAM_WEDGEHOURS=0
      - MAM_WORKDIR=/tmp
