apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: empty
spec:
  template:
    spec:
      containers:
        - name: app
          envFrom:
            - secretRef:
                name: transmute-secrets
          volumeMounts:
            - mountPath: /app/data
              name: data
          readinessProbe:
            httpGet:
              port: 3313
              path: /api/health/ready
