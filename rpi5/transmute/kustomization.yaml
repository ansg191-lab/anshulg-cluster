apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/statefulset
  - secrets.yaml
  - middleware.yaml

components:
  - ../../kustomize/components/ingress
  - ../../kustomize/components/direct-ingress

namePrefix: transmute-
labels:
  - pairs:
      app.kubernetes.io/name: transmute
    includeSelectors: true

images:
  - name: busybox
    newName: ghcr.io/transmute-app/transmute
    newTag: 1.2.0@sha256:9a644e42082c010604b4299674eb1722eafdc83e5b6b85d1feb1782610d6ef38

configMapGenerator:
  - name: domain-config
    literals:
      - DOMAIN=transmute.internal
      - DIRECT_DOMAIN=transmute.anshulg.direct

patches:
  - target:
      kind: StatefulSet
    path: patch-statefulset.yaml
  - target:
      kind: StatefulSet
    path: patch-statefulset2.yaml
  - target:
      kind: Service
    path: patch-service.yaml
  - target:
      group: traefik.io
      kind: IngressRoute
      version: v1alpha1
    path: patch-ingress.yaml
