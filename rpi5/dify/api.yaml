apiVersion: apps/v1
kind: Deployment
metadata:
  name: dify-api
  namespace: dify
  labels:
    app: dify
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dify
      component: api
  template:
    metadata:
      labels:
        app: dify
        component: api
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: api
          image: langgenius/dify-api:1.13.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MODE
              value: api
            - name: CELERY_BROKER_URL
              value: redis://:$(REDIS_PASSWORD)@dify-redis:6379/1
          envFrom:
            - configMapRef:
                name: dify-config
            - secretRef:
                name: dify-secrets
          ports:
            - containerPort: 5001
              name: http
          volumeMounts:
            - mountPath: /app/api/storage
              name: app-storage
            - mountPath: /etc/ssl/certs/ca-certificates.crt
              name: ca-certs
              subPath: ca.crt
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: dify-app-storage
        - name: ca-certs
          configMap:
            name: anshulg-ca
---
apiVersion: v1
kind: Service
metadata:
  name: dify-api
  namespace: dify
spec:
  selector:
    app: dify
    component: api
  ports:
    - port: 5001
      targetPort: 5001
      name: http
