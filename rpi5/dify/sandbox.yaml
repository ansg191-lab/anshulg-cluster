apiVersion: apps/v1
kind: Deployment
metadata:
  name: dify-sandbox
  namespace: dify
  labels:
    app: dify
    component: sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dify
      component: sandbox
  template:
    metadata:
      labels:
        app: dify
        component: sandbox
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: sandbox
          image: langgenius/dify-sandbox:0.2.12
          imagePullPolicy: IfNotPresent
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: SANDBOX_API_KEY
            - name: GIN_MODE
              value: release
            - name: WORKER_TIMEOUT
              value: "15"
            - name: ENABLE_NETWORK
              value: "true"
            - name: HTTP_PROXY
              value: http://dify-ssrf-proxy:3128
            - name: HTTPS_PROXY
              value: http://dify-ssrf-proxy:3128
          ports:
            - containerPort: 8194
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dify-sandbox
  namespace: dify
spec:
  selector:
    app: dify
    component: sandbox
  ports:
    - port: 8194
      targetPort: 8194
      name: http
