apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dify-redis-data
  namespace: dify
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dify-redis
  namespace: dify
  labels:
    app: dify
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dify
      component: redis
  template:
    metadata:
      labels:
        app: dify
        component: redis
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: redis
          image: redis:8-alpine@sha256:2afba59292f25f5d1af200496db41bea2c6c816b059f57ae74703a50a03a27d0
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - mountPath: /data
              name: redis-data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: dify-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: dify-redis
  namespace: dify
spec:
  selector:
    app: dify
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
