apiVersion: apps/v1
kind: Deployment
metadata:
  name: dify-web
  namespace: dify
  labels:
    app: dify
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dify
      component: web
  template:
    metadata:
      labels:
        app: dify
        component: web
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: web
          image: langgenius/dify-web:1.13.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: dify-web-config
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dify-web
  namespace: dify
spec:
  selector:
    app: dify
    component: web
  ports:
    - port: 3000
      targetPort: 3000
      name: http
