apiVersion: apps/v1
kind: Deployment
metadata:
  name: dify-worker
  namespace: dify
  labels:
    app: dify
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dify
      component: worker
  template:
    metadata:
      labels:
        app: dify
        component: worker
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: worker
          image: langgenius/dify-api:1.13.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MODE
              value: worker
            - name: CELERY_BROKER_URL
              value: redis://:$(REDIS_PASSWORD)@dify-redis:6379/1
          envFrom:
            - configMapRef:
                name: dify-config
            - secretRef:
                name: dify-secrets
          volumeMounts:
            - mountPath: /app/api/storage
              name: app-storage
            - mountPath: /etc/ssl/certs/ca-certificates.crt
              name: ca-certs
              subPath: ca.crt
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: dify-app-storage
        - name: ca-certs
          configMap:
            name: anshulg-ca
