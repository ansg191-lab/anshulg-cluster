apiVersion: batch/v1
kind: CronJob
metadata:
  name: send-reminders
spec:
  schedule: "0 8 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: send-reminders
              image: busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - "wget -q -O - --header=\"Authorization: Bearer '$CRON_SECRET'\" http://nametag-svc/api/cron/send-reminders"
              env:
                - name: CRON_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: env
                      key: CRON_SECRET
              securityContext:
                runAsUser: 10001
                runAsGroup: 10001
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
          restartPolicy: OnFailure
---
