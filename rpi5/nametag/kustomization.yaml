apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/statefulset
  - cronjobs.yaml
  - secrets.yaml

components:
#  - ../../kustomize/components/ingress
  - ../../kustomize/components/direct-ingress
  - ../../kustomize/components/security-context

namePrefix: nametag-
labels:
  - pairs:
      app.kubernetes.io/name: nametag
    includeSelectors: true

images:
  - name: busybox
    newName: ghcr.io/mattogodoy/nametag
    newTag: 0.43.3@sha256:b8ae7a60f34e1cf547d2a226133b4740c72b84c10a02610c6856b3bdf697f86c

configMapGenerator:
  - name: domain-config
    literals:
      - DIRECT_DOMAIN=nametag.anshulg.direct
  - name: env-config
    literals:
      - DB_HOST="rpi4.anshulg.direct"
      - DB_PORT="5432"
      - DB_NAME="nametag"
      - DB_USER="nametag"
      - NEXTAUTH_URL="https://nametag.anshulg.direct"
      - SMTP_HOST="mail.mail.svc.cluster.local"
      - SMTP_PORT="587"
      - SMTP_SECURE="false"
      - SMTP_REQUIRE_TLS="false"
      - EMAIL_DOMAIN="anshulg.com"
      - DISABLE_REGISTRATION="true"

patches:
  - target:
      kind: StatefulSet
    path: patch-statefulset.yaml
  - target:
      kind: StatefulSet
    path: patch-statefulset2.yaml
  - target:
      kind: Service
    path: patch-service.yaml
