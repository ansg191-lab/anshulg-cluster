apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/statefulset
  - secrets.yaml

components:
  - ../../kustomize/components/direct-ingress
  - ../../kustomize/components/security-context

namePrefix: hister-
labels:
  - pairs:
      app.kubernetes.io/name: hister
    includeSelectors: true

images:
  - name: busybox
    newName: ghcr.io/asciimoo/hister
    newTag: v0.16.0-debug@sha256:865ff4fddbcb2f861ed7febce35223feab920e3e8e244a93f2197b335e1c9801

configMapGenerator:
  - name: domain-config
    literals:
      - DIRECT_DOMAIN=hister.anshulg.direct
  - name: config
    files:
      - config.yml

patches:
  - target:
      kind: StatefulSet
    path: patch-statefulset.yaml
  - target:
      kind: StatefulSet
    path: patch-statefulset2.yaml
  - target:
      kind: Service
    path: patch-service.yaml
