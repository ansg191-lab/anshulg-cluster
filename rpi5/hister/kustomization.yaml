apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/statefulset
  - secrets.yaml

components:
  - ../../kustomize/components/direct-ingress
  - ../../kustomize/components/security-context

namePrefix: hister-
labels:
  - pairs:
      app.kubernetes.io/name: hister
    includeSelectors: true

images:
  - name: busybox
    newName: ghcr.io/asciimoo/hister
    newTag: v0.14.0-debug@sha256:b2cd3bf21bc04922caab0bf869fd585f73ad24e442cfbf7334e9c5e6b806620a

configMapGenerator:
  - name: domain-config
    literals:
      - DIRECT_DOMAIN=hister.anshulg.direct
  - name: config
    files:
      - config.yml

patches:
  - target:
      kind: StatefulSet
    path: patch-statefulset.yaml
  - target:
      kind: StatefulSet
    path: patch-statefulset2.yaml
  - target:
      kind: Service
    path: patch-service.yaml
