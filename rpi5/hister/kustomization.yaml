apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kustomize/base
  - ../../kustomize/workloads/statefulset
  - secrets.yaml

components:
  - ../../kustomize/components/ingress
  - ../../kustomize/components/security-context

namePrefix: hister-
labels:
  - pairs:
      app.kubernetes.io/name: hister
    includeSelectors: true

images:
  # Pinned to master until v0.12.0 is released (need PostgreSQL support, not in v0.11.0)
  - name: busybox
    newName: ghcr.io/asciimoo/hister
    newTag: master@sha256:066e19ad6a8825583ce12f818f1285e96ad72285b6348b6393dfbfd2e0e2d497

configMapGenerator:
  - name: domain-config
    literals:
      - DOMAIN=hister.internal
  - name: config
    files:
      - config.yml

patches:
  - target:
      kind: StatefulSet
    path: patch-statefulset.yaml
  - target:
      kind: StatefulSet
    path: patch-statefulset2.yaml
  - target:
      kind: Service
    path: patch-service.yaml
