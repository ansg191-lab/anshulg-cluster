apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: empty
spec:
  template:
    spec:
      containers:
        - name: app
          env:
            - name: HISTER__SERVER__BASE_URL
              value: https://hister.anshulg.direct
          envFrom:
            - secretRef:
                name: hister-secrets
          volumeMounts:
            - mountPath: /hister/data
              name: data
            - mountPath: /hister/data/config.yml
              name: config
              subPath: config.yml
          readinessProbe:
            httpGet:
              port: 4433
              path: /
          livenessProbe:
            httpGet:
              port: 4433
              path: /
            initialDelaySeconds: 30
      volumes:
        - name: config
          configMap:
            name: config
