apiVersion: batch/v1
kind: CronJob
metadata:
  name: kometa
  labels:
    app.kubernetes.io/name: kometa
spec:
  schedule: "0 8 * * *"
  timeZone: "America/Los_Angeles"
  concurrencyPolicy: Forbid
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: kometa
    spec:
      template:
        spec:
          initContainers:
            - name: copy-config
              image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -euxc
                - |
                  cp /src-config/* /config/
              volumeMounts:
                - mountPath: /config
                  name: config
                - mountPath: /src-config
                  name: src-config
          containers:
            - name: kometa
              image: kometateam/kometa:v2.4.3@sha256:9ae79894a328d53b51789fcd5c502d22fc5f1d417dc2479ca819892f67e9eca3
              imagePullPolicy: IfNotPresent
              args:
                - --run
              volumeMounts:
                - mountPath: /config
                  name: config
          restartPolicy: OnFailure
          volumes:
            - name: config
              persistentVolumeClaim:
                claimName: kometa-pvc
            - name: src-config
              secret:
                secretName: kometa-config
