apiVersion: batch/v1
kind: CronJob
metadata:
  name: kometa
  labels:
    app.kubernetes.io/name: kometa
spec:
  schedule: "0 8 * * *"
  timeZone: "America/Los_Angeles"
  concurrencyPolicy: Forbid
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: kometa
    spec:
      template:
        spec:
          initContainers:
            - name: copy-config
              image: busybox:1.38.0@sha256:b6762ddf4a50aabb5f4d21aa6f447d05d5633fb09f09c08b33f22356a2f98be0
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -euxc
                - |
                  cp /src-config/* /config/
              volumeMounts:
                - mountPath: /config
                  name: config
                - mountPath: /src-config
                  name: src-config
          containers:
            - name: kometa
              image: kometateam/kometa:v2.3.1@sha256:683c04827ef3fecf1cc5cb178f75f91f968aef6c6d89d34bc9c70966fd1d7259
              imagePullPolicy: IfNotPresent
              args:
                - --run
              volumeMounts:
                - mountPath: /config
                  name: config
          restartPolicy: OnFailure
          volumes:
            - name: config
              persistentVolumeClaim:
                claimName: kometa-pvc
            - name: src-config
              secret:
                secretName: kometa-config
